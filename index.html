<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SoundSeeds</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #05010A;
  color: white;
}

/* ================= HERO ================= */
.hero {
  height: 80vh;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(5,1,10,0.9)),
    url("https://images.unsplash.com/photo-1518972559570-7cc1309f3229?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
}

.hero p {
  color: #00FFD5;
  font-size: 22px;
}

/* ================= LAYOUT ================= */
.section {
  padding: 60px 20px;
}

.glass {
  max-width: 700px;
  margin: auto;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* ================= INPUTS ================= */
input {
  width: 90%;
  max-width: 500px;
  padding: 14px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

/* ================= BUTTON ================= */
button {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  background: #00FFD5;
  cursor: pointer;
  font-weight: bold;
}

/* ================= FEED ================= */
#feed {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.card h3 {
  margin: 0;
  color: #00FFD5;
}

.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 999px;
  background: rgba(0,255,213,0.15);
  color: #00FFD5;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>SoundSeeds</h1>
    <p>Discover Your Musical Identity</p>
  </div>
</div>

<!-- IDENTITY ENGINE -->
<div class="section">
  <div class="glass">

    <h2>AI Music Identity Engine</h2>

    <input id="name" placeholder="Artist Name" />
    <input id="birth" type="date" />
    <input id="track" placeholder="Music URL" />

    <br><br>

    <button onclick="createArtist()">Generate Artist Identity</button>

  </div>
</div>

<!-- FEED -->
<div class="section">
  <h2 style="text-align:center;">Featured Artists</h2>
  <div id="feed"></div>
</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://rduvfdwubraehqqwiupe.supabase.co";
const SUPABASE_KEY = "sb_publishable_GdcbeYfetx-OWJZuR1G3ew_c3dmWoBk";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   AI ENGINE
========================= */
function resonanceEngine(name, birth) {

  let score = birth.replaceAll("-","")
    .split("")
    .reduce((a,b)=>a + Number(b), 0);

  if (score < 40) {
    return { archetype:"Lunar Dreamer", bio:"Emotional atmospheric creator", energy:"Soft", audience:"Late-night listeners", stage:"Intimate storyteller" };
  }

  if (score < 60) {
    return { archetype:"Neon Performer", bio:"Balanced emotional + rhythmic energy", energy:"Balanced", audience:"Indie + mainstream", stage:"Festival performer" };
  }

  if (score < 80) {
    return { archetype:"Solar Storyteller", bio:"Emotion-driven narrative sound", energy:"High emotional", audience:"Story listeners", stage:"Expressive performer" };
  }

  return { archetype:"Quantum Architect", bio:"Experimental sonic builder", energy:"Experimental", audience:"Deep listeners", stage:"Concept artist" };
}

/* =========================
   CREATE ARTIST
========================= */
window.createArtist = async function () {

  const name = document.getElementById("name").value;
  const birth = document.getElementById("birth").value;
  const track = document.getElementById("track").value;

  const identity = resonanceEngine(name, birth);

  const { error } = await supabase.from("artists").insert([{
    name,
    birth,
    track,
    archetype: identity.archetype,
    bio: identity.bio,
    energy: identity.energy,
    audience: identity.audience,
    stage: identity.stage
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  loadArtists();
};

/* =========================
   LOAD ARTISTS
========================= */
async function loadArtists() {

  const { data } = await supabase
    .from("artists")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(a => {

    feed.innerHTML += `
      <div class="card">
        <h3>${a.name}</h3>
        <div class="badge">${a.archetype}</div>
        <p>${a.bio}</p>
        <p style="opacity:0.7">${a.energy} • ${a.audience}</p>
        <audio controls src="${a.track}" style="width:100%;margin-top:10px;"></audio>
      </div>
    `;
  });
}

loadArtists();

</script>

</body>
</html>
